version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
    labels:
      - dependencies
      - npm
    reviewers:
      - developerfred
    groups:
      minor:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    commit-message:
      prefix: ci
    labels:
      - ci
      - github-actions
